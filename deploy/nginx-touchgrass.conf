server {
    listen 127.0.0.1:8080;
    server_name touchgrass.em95.org;

    root /opt/touchgrass/repo/dist;
    index index.html;

    # ── Security headers ──────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "0" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # ── Cache static assets ───────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Deny access to hidden files ───────────────
    location ~ /\. {
        deny all;
        return 403;
    }

    # ── Deny known sensitive paths explicitly ─────
    location ~ ^/(webhook|admin|console|wp-admin|deploy\.(log|sh)|config\.yml|package\.json|package-lock\.json|node_modules|\.git|\.env|\.ssh|opt|proc|server-status) {
        return 404;
    }

    # ── SPA fallback ──────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
