<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#182b19" />

    <title>Grass Touching Simulator</title>
    <meta name="description" content="Touch grass. Literally. A soothing pixel-art journey into nature. Relax, breathe, and feel the grass." />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Grass Touching Simulator" />
    <meta property="og:description" content="Touch grass. Literally. A soothing pixel-art journey into nature." />
    <meta property="og:image" content="https://touchgrass.em95.org/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:url" content="https://touchgrass.em95.org/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Grass Touching Simulator" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Grass Touching Simulator" />
    <meta name="twitter:description" content="Touch grass. Literally. A soothing pixel-art journey into nature." />
    <meta name="twitter:image" content="https://touchgrass.em95.org/og-image.png" />
  </head>
  <body>
    <div id="game"></div>
    <noscript>This game needs JavaScript because the grass refuses to touch itself.</noscript>

    <button id="btn-breathe" aria-label="Breathe">breathe</button>

    <script>
      window.__GTS_MINPUT__ = { breathe: false };
      const breatheBtn = document.getElementById('btn-breathe');
      if (breatheBtn) {
        breatheBtn.addEventListener('pointerdown', (e) => {
          e.preventDefault(); e.stopPropagation();
          window.__GTS_MINPUT__.breathe = true;
        });
        breatheBtn.addEventListener('pointerup', (e) => {
          e.preventDefault(); e.stopPropagation();
          window.__GTS_MINPUT__.breathe = false;
        });
        // Poll game state to show/hide/gray the button
        setInterval(() => {
          const scene = window.__GTS_READY__;
          const state = window.__GTS_STATE__;
          if (scene !== 'game' || (state && state.ended)) {
            breatheBtn.style.display = 'none';
          } else {
            breatheBtn.style.display = '';
            if (state && !state.breathReady) {
              breatheBtn.style.opacity = '0.35';
              breatheBtn.style.pointerEvents = 'none';
            } else {
              breatheBtn.style.opacity = '';
              breatheBtn.style.pointerEvents = '';
            }
          }
        }, 300);
      }
    </script>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
