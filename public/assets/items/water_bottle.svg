<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 64" width="48" height="64">
  <!-- Bottle body - glass outline -->
  <rect x="16" y="20" width="16" height="36" rx="5" ry="5" fill="#7ec8e3" fill-opacity="0.6" stroke="#2c5f8a" stroke-width="2"/>
  <!-- Water fill -->
  <rect x="18" y="30" width="12" height="24" rx="3" ry="3" fill="#4da6ff" fill-opacity="0.85"/>
  <!-- Water shine -->
  <rect x="20" y="32" width="4" height="16" rx="2" ry="2" fill="#b3dfff" fill-opacity="0.5"/>
  <!-- Bottle neck -->
  <rect x="19" y="10" width="10" height="12" rx="2" ry="2" fill="#7ec8e3" fill-opacity="0.5" stroke="#2c5f8a" stroke-width="2"/>
  <!-- Bottle cap -->
  <rect x="18" y="6" width="12" height="6" rx="2" ry="2" fill="#2c5f8a"/>
  <!-- Cap highlight -->
  <rect x="21" y="7" width="5" height="3" rx="1" ry="1" fill="#4a7fb5" fill-opacity="0.6"/>
  <!-- Bottle bottom curve -->
  <ellipse cx="24" cy="54" rx="8" ry="3" fill="#5ca0c8" fill-opacity="0.4" stroke="#2c5f8a" stroke-width="1.5"/>
  <!-- Sparkle -->
  <circle cx="34" cy="12" r="2" fill="#ffffff" fill-opacity="0.9"/>
  <circle cx="36" cy="8" r="1.5" fill="#ffffff" fill-opacity="0.7"/>
  <circle cx="10" cy="32" r="1.5" fill="#ffffff" fill-opacity="0.6"/>
</svg>
